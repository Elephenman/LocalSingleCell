# =============================================================================
# LocalSingleCell Docker Compose 配置
# =============================================================================

version: '3.8'

services:
  localsinglecell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localsinglecell
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # 挂载日志目录，便于查看日志
      - ./logs:/app/logs
      # 挂载临时文件目录
      - ./temp:/app/temp
      # 挂载示例数据目录
      - ./sample_data:/app/sample_data
      # 可选：挂载用户数据目录
      # - ./user_data:/app/user_data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - localsinglecell-network

networks:
  localsinglecell-network:
    driver: bridge
