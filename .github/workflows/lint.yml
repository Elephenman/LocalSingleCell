# =============================================================================
# LocalSingleCell - Lint Workflow
# 代码质量检查工作流
# =============================================================================

name: Code Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'core/**'
      - 'utils/**'
      - 'ui/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black isort

      - name: Run Ruff (linting)
        run: |
          ruff check core/ utils/ ui/ --output-format=github || true
        continue-on-error: true

      - name: Run Black (formatting check)
        run: |
          black --check core/ utils/ ui/ --diff || true
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff core/ utils/ ui/ || true
        continue-on-error: true

      - name: Run MyPy (type checking)
        run: |
          mypy core/ utils/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  lint-summary:
    name: Lint Summary
    needs: lint
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Code quality checks completed."
          echo "Note: Some checks may have warnings - review the output above."
